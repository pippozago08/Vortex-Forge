services:
  - type: web
    name: vortex-forge
    runtime: python
    buildCommand: bash build.sh
    startCommand: bash scripts/render_start.sh
    disk:
      name: vortex-forge-media
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: "vortex-forge.onrender.com,.onrender.com,localhost,127.0.0.1"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: SITE_PUBLIC_URL
        value: "https://vortex-forge.onrender.com"
      - key: SITE_SUPPORT_EMAIL
        value: "vortexforge.support@gmail.com"
      - key: PAYMENT_PROVIDER
        value: "simulated"
      - key: PAYMENT_DEFAULT_CURRENCY
        value: "EUR"
      - key: SIMULATED_PAYMENTS_ENABLED
        value: "True"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SECURE_HSTS_SECONDS
        value: "31536000"
      - key: SECURE_HSTS_INCLUDE_SUBDOMAINS
        value: "True"
      - key: SECURE_HSTS_PRELOAD
        value: "True"
      - key: SERVE_MEDIA_FILES
        value: "True"
      - key: MEDIA_ROOT
        value: "/var/data/media"
      - key: DATABASE_URL
        fromDatabase:
          name: vortex-forge-db
          property: connectionString

databases:
  - name: vortex-forge-db
    plan: free
    databaseName: vortex_forge
    user: vortex_forge_user
